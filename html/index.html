<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partie 2</title>
    <link rel="stylesheet" href="style.css">
    <script src="data/pokemons.js"></script>
    <script src="data/pokemon_types.js"></script>
    <script src="data/pokemon_moves.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div id="conteneurPage">
        <header id="headerPrincipal">
            <div class="header-contenu">
                <div>
                    <h1>Liste des Pokémons</h1>
                </div>

                <nav id="paginationHaut">
                    <button id="precedentHaut" type="button">PRÉC</button>
                    <span id="infoPage">Page 1 / 1</span>
                    <button id="suivantHaut" type="button">SUIV</button>
                </nav>
            </div>
        </header>

        <main>
            <section id="conteneurTableau">
                <table>
                    <thead>
                        <tr>
                            <th>Identifiant unique</th>
                            <th>Nom</th>
                            <th>Génération</th>
                            <th>Types</th>
                            <th>Endurance</th>
                            <th>Points d’attaque de base</th>
                            <th>Points de défense de base</th>
                            <th>Image</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Popup Détails Pokémon -->
    <div id="pokemonDetailsPopup" class="popupOverlay" style="display: none;">
        <div class="popupCard">
            <button id="fermerPopup" class="fermerPopupBtn" type="button">✕</button>
            <div id="popupContent" class="popupContent"></div>
        </div>
    </div>

    <!-- Popup Aperçu Image -->
    <div id="imagePreviewPopup" class="imagePreview" style="display: none;">
        <img id="imagePreviewImg" src="" alt="" />
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Pro - Section 2</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/jquery3xx.js"></script>
    <script src="data/pokemons.js"></script>
    <script src="data/pokemon_types.js"></script>
    <script src="data/pokemon_moves.js"></script>
    <script src="data/type_effectiveness.js"></script>
    <script src="data/fast_moves.js"></script>
    <script src="data/charged_moves.js"></script>
    <script src="data/class_type.js"></script>
    <script src="data/class_attack.js"></script>
    <script src="data/class_pokemon.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
    <div id="conteneurPage">
        <header id="headerPrincipal">
            <div class="header-contenu">
                <div>
                    <h1>Liste des Pokémons</h1>
                </div>

                <nav id="paginationHaut">
                    <button id="precedentHaut" type="button">PRÉC</button>
                    <span id="infoPage">Page 1 / 1</span>
                    <button id="suivantHaut" type="button">SUIV</button>
                </nav>
            </div>
        </header>

        <main>
            <!-- Zone de filtrage -->
            <section id="zoneFiltre" class="filtreContainer">
                <div class="filtreGroup">
                    <label for="filtreType">Type:</label>
                    <select id="filtreType">
                        <option value="">-- Aucun filtre --</option>
                    </select>
                </div>
                
                <div class="filtreGroup">
                    <label for="filtreAttaque">Attaques rapides:</label>
                    <select id="filtreAttaque">
                        <option value="">-- Aucun filtre --</option>
                    </select>
                </div>
                
                <div class="filtreGroup">
                    <label for="filtreNom">Nom:</label>
                    <input type="text" id="filtreNom" placeholder="Chercher un Pokémon..." />
                </div>
            </section>
            
            <section id="conteneurTableau">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Génération</th>
                            <th>Types</th>
                            <th>Endurance</th>
                            <th>Attaque</th>
                            <th>Défense</th>
                            <th>Image</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="pokemonDetailsPopup" class="superpositionPopup" style="display: none;">
        <div class="cartePopup">
            <button id="fermerPopup" class="fermerPopupBtn" type="button">✕</button>
            <div id="contenuPopup" class="contenuPopup">
                </div>
        </div>
    </div>

    <div id="popupApercuImage" class="apercuImage" style="display: none;">
        <img id="imageApercuImg" src="" alt="" />
    </div>
</body>
</html>
